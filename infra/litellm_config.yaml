model_list:
  - model_name: gemini-planner
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-narrator
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

# Fallback option if direct LiteLLM-to-Gemini routing blocks during the demo.
# Prefer the direct Gemini route above for Track 4 and Gemini award clarity.
# Use infra/litellm_openrouter_config.yaml with:
#   scripts\start_litellm.ps1 -OpenRouter

litellm_settings:
  drop_params: true
  set_verbose: false
